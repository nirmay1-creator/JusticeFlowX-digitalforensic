<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JusticeFlowX - AI Packet Threat Hunter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- JusticeFlowX CSS & Fonts -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/justice.css">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Recharts -->
  <script crossorigin src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts/umd/Recharts.js"></script>

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    /* Add some specific overrides to fit the React app into the JusticeFlowX layout without scrolling issues */
    body {
        margin: 0;
        padding: 0;
        overflow: hidden; /* Let the React app handle internal scrolling */
    }
    
    #root {
        height: calc(100vh - 70px); /* Account for navbar */
        position: relative;
        z-index: 10;
        overflow-y: auto;
    }
    
    /* Ensure JusticeFlowX background elements stay in background */
    .scanline-overlay, .noise-overlay, #hexCanvas {
        z-index: 1 !important;
    }
    
    .navbar {
        z-index: 20 !important;
    }

    /* Custom Animations for Threat Hunter UI */
    @keyframes sweepHover {
        0% { top: -10%; }
        100% { top: 110%; }
    }
    @keyframes terminalTyping {
        0% { content: "Extracting packets..."; }
        25% { content: "Running Isolation Forest ML..."; }
        50% { content: "Calculating entropy thresholds..."; }
        75% { content: "Cross-referencing IOCs..."; }
        100% { content: "Finalizing Threat Matrix..."; }
    }
    .animate-terminal::after {
        content: "Extracting packets...";
        animation: terminalTyping 4s infinite;
    }
    .th-glass-card {
        background: rgba(5, 20, 40, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 245, 255, 0.2);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    .th-glass-card:hover {
        border: 1px solid rgba(0, 245, 255, 0.6);
        box-shadow: 0 0 20px rgba(0, 245, 255, 0.15);
    }
    
    /* Cyberpunk Grid Background */
    .cyber-grid {
        position: absolute;
        bottom: -50%;
        left: -50%;
        width: 200%;
        height: 150%;
        background-image: 
            linear-gradient(rgba(0, 245, 255, 0.15) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 245, 255, 0.15) 1px, transparent 1px);
        background-size: 60px 60px;
        transform: perspective(600px) rotateX(60deg);
        animation: gridMove 4s linear infinite;
        z-index: 0;
        pointer-events: none;
        mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
        -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
    }

    @keyframes gridMove {
        0% { transform: perspective(600px) rotateX(60deg) translateY(0); }
        100% { transform: perspective(600px) rotateX(60deg) translateY(60px); }
    }

    .packet {
        position: absolute;
        width: 2px;
        border-radius: 50%;
        opacity: 0;
        animation: packetDrop linear infinite;
        z-index: 1;
    }

    @keyframes packetDrop {
        0% { transform: translateY(-10vh); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(110vh); opacity: 0; }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes scaleUp {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body id="top">
  <!-- JusticeFlowX Background Effects -->
  <div class="scanline-overlay"></div>
  <div class="noise-overlay"></div>
  <canvas id="hexCanvas"></canvas>

  <!-- JusticeFlowX Navbar -->
  <nav class="navbar">
    <div class="nav-left">
      <div class="brand-block">
        <span class="brand">JusticeFlowX</span>
        <span class="brand-sub">AI Packet Threat Hunter v1.0</span>
      </div>
    </div>
    <div class="nav-center">
      <a href="../../index.html" class="nav-link"><i class='bx bx-grid-alt'></i><span>Dashboard</span></a>
      <a href="../packet_analyzer/packet_analyzer.html" class="nav-link"><i class='bx bx-search-alt'></i><span>Packet Analyzer</span></a>
      <a href="#" class="nav-link active"><i class='bx bx-radar'></i><span>AI Threat Hunter</span></a>
    </div>
    <div class="nav-right">
      <div class="clock-display" id="clockDisplay">00:00:00</div>
    </div>
  </nav>

  <!-- React Root -->
  <div id="root"></div>

  <!-- JusticeFlowX Base Scripts -->
  <script src="../../assets/js/justice.js"></script>
  
  <!-- React Application Component -->
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    
    // Safely extract Recharts components
    const Recharts = window.Recharts || {};
    const {
      BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
      PieChart, Pie, Cell
    } = Recharts;

    const COLORS = ['#00FF88', '#FF0055', '#00D4FF', '#FFD700', '#FF9F43'];

    const THREAT_INFO = {
        'port_scanning': {
            title: 'Port Scanning',
            desc: 'An attacker is systematically probing your network ports to find open doors and identify running services, which is usually the reconnaissance phase before a targeted attack.',
            mitigation: 'Implement rate limiting on firewalls, use IDS/IPS to block aggressive IPs, and close unnecessary open ports.'
        },
        'ddos_traffic': {
            title: 'DDoS Traffic',
            desc: 'Distributed Denial of Service (DDoS) traffic indicates an attempt to overwhelm your network or servers with a flood of illegitimate requests, causing service disruption.',
            mitigation: 'Deploy anti-DDoS hardware/services, configure router rate-limiting, and utilize Anycast routing to absorb the traffic.'
        },
        'malware_communication': {
            title: 'Malware Communication',
            desc: 'Suspicious outbound traffic patterns match known malware signatures or unusual high-entropy payloads, suggesting an internal machine is infected.',
            mitigation: 'Isolate the affected machine immediately, run endpoint antivirus/EDR scans, and block the destination IPs at the firewall.'
        },
        'data_exfiltration': {
            title: 'Data Exfiltration',
            desc: 'An unusual amount of data is being transferred outbound to an external server. This often indicates a breach where attackers are stealing sensitive data.',
            mitigation: 'Monitor and restrict outbound traffic sizes, use Data Loss Prevention (DLP) tools, and block unauthorized cloud storage domains.'
        },
        'sql_injection': {
            title: 'SQL Injection',
            desc: 'Web requests contain malicious SQL syntax in parameters or payloads, attempting to manipulate your backend database to dump or destroy data.',
            mitigation: 'Use prepared statements/parameterized queries in your application code, and deploy a Web Application Firewall (WAF) to filter SQLi payloads.'
        },
        'c2_communication': {
            title: 'C2 Communication',
            desc: 'Traffic is beaconing to a known Command and Control (C2) server. Attackers use this to remotely control compromised machines and deploy further ransomware.',
            mitigation: 'Block known C2 domains/IPs using threat intelligence feeds, isolate the beaconing host, and investigate the initial infection vector.'
        },
        'dns_tunneling': {
            title: 'DNS Tunneling',
            desc: 'Data is being encoded into DNS queries and responses to bypass firewalls and exfiltrate data or communicate with a C2 server covertly.',
            mitigation: 'Monitor DNS request sizes and frequencies, block direct outbound DNS (force use of internal DNS), and use DNS filtering solutions.'
        }
    };

    const AnimatedNumber = ({ value }) => {
        const [count, setCount] = useState(0);
        
        useEffect(() => {
            let start = 0;
            const end = parseInt(value);
            if (isNaN(end)) {
                setCount(value);
                return;
            }
            const duration = 1500;
            const increment = end / (duration / 16);
            
            const timer = setInterval(() => {
                start += increment;
                if (start >= end) {
                    setCount(end);
                    clearInterval(timer);
                } else {
                    setCount(Math.floor(start));
                }
            }, 16);
            
            return () => clearInterval(timer);
        }, [value]);
        
        return <span>{count}</span>;
    };

    const CyberBackground = () => {
        // Generate random packets on component mount
        const [packets, setPackets] = useState([]);
        
        useEffect(() => {
            const generatedPackets = Array.from({ length: 40 }).map((_, i) => ({
                id: i,
                left: `${Math.random() * 100}%`,
                duration: `${Math.random() * 3 + 2}s`,
                delay: `${Math.random() * 5}s`,
                color: Math.random() > 0.5 ? '#00ff88' : '#00f5ff',
                height: `${Math.random() * 30 + 10}px`
            }));
            setPackets(generatedPackets);
        }, []);

        return (
            <div className="fixed inset-0 overflow-hidden pointer-events-none" style={{ zIndex: -1 }}>
                {/* Radial dark gradient for depth */}
                <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-transparent via-[#010613]/80 to-[#000000] z-0"></div>
                
                {/* 3D Cyber grid floor */}
                <div className="cyber-grid"></div>

                {/* Vertical data packet streams */}
                {packets.map(p => (
                    <div 
                        key={p.id}
                        className="packet"
                        style={{
                            left: p.left,
                            animationDuration: p.duration,
                            animationDelay: p.delay,
                            backgroundColor: p.color,
                            boxShadow: `0 0 10px ${p.color}, 0 0 20px ${p.color}`,
                            height: p.height
                        }}
                    ></div>
                ))}
            </div>
        );
    };

    const ThreatHunterApp = () => {
      const [file, setFile] = useState(null);
      const [isUploading, setIsUploading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [dragActive, setDragActive] = useState(false);
      const [selectedThreatInfo, setSelectedThreatInfo] = useState(null);
      
      const fileInputRef = useRef(null);

      const handleDrag = function(e) {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === "dragenter" || e.type === "dragover") {
          setDragActive(true);
        } else if (e.type === "dragleave") {
          setDragActive(false);
        }
      };

      const handleDrop = function(e) {
        e.preventDefault();
        e.stopPropagation();
        setDragActive(false);
        
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          const droppedFile = e.dataTransfer.files[0];
          if (droppedFile.name.endsWith('.pcap') || droppedFile.name.endsWith('.pcapng')) {
              setFile(droppedFile);
              setError(null);
          } else {
              setError("Invalid file type. Only .pcap or .pcapng files are supported.");
          }
        }
      };

      const handleChange = function(e) {
        e.preventDefault();
        if (e.target.files && e.target.files[0]) {
          const selectedFile = e.target.files[0];
           if (selectedFile.name.endsWith('.pcap') || selectedFile.name.endsWith('.pcapng')) {
              setFile(selectedFile);
              setError(null);
          } else {
              setError("Invalid file type. Only .pcap or .pcapng files are supported.");
          }
        }
      };

      const onButtonClick = () => {
        fileInputRef.current.click();
      };

      const resetState = () => {
          setFile(null);
          setResult(null);
          setError(null);
      };

      const analyzeFile = async (e) => {
        if (e) e.preventDefault();
        if (!file) return;

        setIsUploading(true);
        setError(null);

        const formData = new FormData();
        formData.append("file", file);

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 60000); // 60s

        try {
          const response = await fetch("http://127.0.0.1:8000/api/v1/threat-hunter/analyze", {
            method: "POST",
            body: formData,
            signal: controller.signal,
          });
          clearTimeout(timeoutId);

          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.detail || "Failed to analyze file");
          }

          const data = await response.json();
          setResult(data);
        } catch (err) {
          console.error(err);
          if (err.name === 'AbortError') {
            setError("Analysis timed out — the capture may be too large.");
          } else {
            setError(err.message || "An unexpected error occurred.");
          }
        } finally {
          setIsUploading(false);
        }
      };
      
      const getDetectionChartData = () => {
          if (!result || !result.detections) return [];
          const data = [];
          Object.entries(result.detections).forEach(([key, value]) => {
              if (value) {
                   const label = key.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                   data.push({ name: label, value: 1 });
              }
          });
          return data;
      };

      const detectionChartData = getDetectionChartData();

      return (
        <div className="p-8 max-w-7xl mx-auto font-mono text-white min-h-screen relative z-10">
          <CyberBackground />
          <div className="mb-8 relative z-10">
            <h1 className="text-3xl font-bold text-[#00f5ff] uppercase tracking-widest drop-shadow-[0_0_10px_rgba(0,245,255,0.5)]">
                AI Threat Hunter
            </h1>
            <p className="text-[#00ff88]/80 mt-2 text-sm uppercase tracking-wider drop-shadow-md">
                Automated packet analysis & anomaly detection engine
            </p>
          </div>

          {!result && (
            <div className="flex flex-col items-center justify-center h-[60vh]">
                <div 
                    className={`group overflow-hidden relative w-full max-w-2xl p-12 rounded-xl border-2 border-dashed transition-all duration-300 backdrop-blur-sm
                        ${dragActive ? 'border-[#00ff88] bg-[#00ff88]/10 shadow-[0_0_30px_rgba(0,255,136,0.3)]' : 'border-[#00f5ff]/30 bg-[#051428]/80 hover:border-[#00f5ff]/60 hover:bg-[#00f5ff]/5 hover:shadow-[0_0_20px_rgba(0,245,255,0.2)]'}
                        ${isUploading ? 'opacity-50 pointer-events-none' : ''}
                    `}
                    onDragEnter={handleDrag}
                    onDragLeave={handleDrag}
                    onDragOver={handleDrag}
                    onDrop={handleDrop}
                >
                    <div className={`absolute w-[150%] h-[2px] bg-[#00ff88] shadow-[0_0_15px_#00ff88] -left-1/4 animate-[sweepHover_2s_linear_infinite] opacity-0 transition-opacity duration-300 z-0 ${dragActive ? 'opacity-100' : 'group-hover:opacity-100'}`}></div>
                    
                    <input
                        ref={fileInputRef}
                        type="file"
                        className="hidden"
                        accept=".pcap,.pcapng"
                        onChange={handleChange}
                    />
                    
                    <div className="text-center flex flex-col items-center gap-6 relative z-10">
                        <div className={`p-4 rounded-full transition-transform duration-300 group-hover:scale-110 ${file ? 'bg-[#00ff88]/20 text-[#00ff88] shadow-[0_0_15px_rgba(0,255,136,0.4)]' : 'bg-[#00f5ff]/10 text-[#00f5ff] group-hover:shadow-[0_0_15px_rgba(0,245,255,0.3)]'}`}>
                           {file ? (
                               <i className='bx bxs-file-archive text-5xl animate-pulse'></i>
                           ) : (
                               <i className='bx bx-cloud-upload text-5xl group-hover:-translate-y-1 transition-transform'></i>
                           )}
                        </div>
                        
                        {file ? (
                            <div>
                                <p className="text-xl font-semibold text-[#00ff88] drop-shadow-[0_0_5px_rgba(0,255,136,0.5)]">{file.name}</p>
                                <p className="text-[#00ff88]/70 text-sm mt-2">Ready for analysis ({(file.size / 1024 / 1024).toFixed(2)} MB)</p>
                            </div>
                        ) : (
                            <div>
                                <p className="text-xl font-semibold text-gray-200">Drag and drop PCAP file here</p>
                                <p className="text-gray-400 text-sm mt-2">or</p>
                                <button 
                                    onClick={onButtonClick}
                                    className="mt-4 px-6 py-2 bg-transparent border border-[#00f5ff] text-[#00f5ff] rounded hover:bg-[#00f5ff]/10 transition-colors uppercase text-sm tracking-wider"
                                >
                                    Browse Files
                                </button>
                            </div>
                        )}
                    </div>
                </div>

                {error && (
                    <div className="mt-6 p-4 border border-[#ff0055] bg-[#ff0055]/10 text-[#ff0055] rounded max-w-2xl w-full flex items-center gap-3">
                        <i className='bx bx-error-circle text-xl'></i>
                        {error}
                    </div>
                )}

                {file && (
                    <button
                        type="button"
                        onClick={analyzeFile}
                        disabled={isUploading}
                        className="mt-8 px-12 py-4 bg-gradient-to-r from-[#00f5ff]/20 to-[#00f5ff]/40 border border-[#00f5ff] text-white rounded-lg hover:from-[#00f5ff]/40 hover:to-[#00f5ff]/60 transition-all font-bold tracking-widest flex items-center gap-4 shadow-[0_0_15px_rgba(0,245,255,0.3)] disabled:opacity-100 disabled:cursor-not-allowed group"
                    >
                        {isUploading ? (
                            <div className="flex flex-col items-center justify-center space-y-2">
                                <div className="flex items-center gap-3 text-[#00ff88]">
                                    <i className='bx bx-radar animate-spin text-3xl drop-shadow-[0_0_10px_#00ff88]'></i>
                                    <span className="uppercase animate-pulse font-bold tracking-widest">Processing Payload</span>
                                </div>
                                <span className="text-xs text-[#00f5ff] font-mono lowercase animate-terminal h-4 tracking-normal"></span>
                            </div>
                        ) : (
                            <React.Fragment>
                                <i className='bx bx-target-lock text-2xl group-hover:rotate-90 transition-transform duration-500'></i>
                                <span className="uppercase">Initiate Analysis</span>
                            </React.Fragment>
                        )}
                    </button>
                )}
            </div>
          )}

          {result && result.report && (
            <div className="space-y-6 animate-fade-in-up">
                <div className="flex justify-between items-center mb-6">
                     <h2 className="text-2xl text-gray-200 font-semibold flex items-center gap-3">
                        <i className='bx bx-check-shield text-[#00ff88]'></i>
                        Analysis Complete
                    </h2>
                    <button 
                        onClick={resetState}
                        className="px-4 py-2 bg-transparent border border-gray-600 text-gray-300 rounded hover:bg-gray-800 transition-colors uppercase text-xs tracking-wider flex items-center gap-2"
                    >
                        <i className='bx bx-refresh text-lg'></i> Analyze Another
                    </button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="th-glass-card p-6 rounded-xl relative overflow-hidden group transition-all duration-300">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-[#00f5ff]/10 rounded-bl-full -z-10 transition-transform duration-500 group-hover:scale-125"></div>
                        
                        <h3 className="text-[#00f5ff] text-sm uppercase tracking-widest border-b border-[#00f5ff]/20 pb-2 mb-4 flex items-center justify-between">
                            Top Threat Report
                            <span className={`px-2 py-1 rounded text-xs transition-colors duration-300 shadow-sm ${result.report.confidence > 75 ? 'bg-[#ff0055]/20 text-[#ff0055] border border-[#ff0055]/50 shadow-[#ff0055]/30' : 'bg-[#00ff88]/20 text-[#00ff88] border border-[#00ff88]/50 shadow-[#00ff88]/30'}`}>
                                <AnimatedNumber value={result.report.confidence} />% Confidence
                            </span>
                        </h3>
                        
                        <div className="space-y-4 mt-6 relative z-10">
                            <div className="flex justify-between items-end border-b border-gray-800/50 pb-2 hover:border-[#00f5ff]/50 transition-colors">
                                <span className="text-gray-400 uppercase text-xs tracking-wider">Attack Type</span>
                                <span className={`text-xl font-bold drop-shadow-md ${result.report.attack !== 'No significant threat detected' ? 'text-[#ff0055]' : 'text-[#00ff88]'}`}>
                                    {result.report.attack}
                                </span>
                            </div>
                            <div className="flex justify-between items-end border-b border-gray-800/50 pb-2 hover:border-[#00f5ff]/50 transition-colors">
                                <span className="text-gray-400 uppercase text-xs tracking-wider">Source IP</span>
                                <span className="text-gray-200 font-mono tracking-wider">{result.report.source}</span>
                            </div>
                            <div className="flex justify-between items-end border-b border-gray-800/50 pb-2 hover:border-[#00f5ff]/50 transition-colors">
                                <span className="text-gray-400 uppercase text-xs tracking-wider">Target</span>
                                <span className="text-gray-200 font-mono tracking-wider">{result.report.target}</span>
                            </div>
                            <div className="flex justify-between items-end pb-2 hover:border-[#00f5ff]/50 border-b border-transparent transition-colors">
                                <span className="text-gray-400 uppercase text-xs tracking-wider">Attempts</span>
                                <span className="text-[#ff9f43] font-bold text-2xl drop-shadow-[0_0_8px_rgba(255,159,67,0.5)]"><AnimatedNumber value={result.report.attempts} /></span>
                            </div>
                        </div>
                    </div>

                    <div className="th-glass-card p-6 rounded-xl transition-all duration-300">
                        <h3 className="text-[#00f5ff] text-sm uppercase tracking-widest border-b border-[#00f5ff]/20 pb-2 mb-4">
                            Heuristic & ML Detections
                        </h3>
                        
                        <div className="grid grid-cols-2 gap-4 mt-6">
                             {Object.entries(result.detections).map(([key, isDetected], index) => {
                                 const label = key.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                                 return (
                                     <div key={key} 
                                         onClick={() => THREAT_INFO[key] && setSelectedThreatInfo(THREAT_INFO[key])}
                                         className={`p-3 border rounded flex items-center justify-between transition-all duration-300 hover:-translate-y-1 cursor-pointer
                                         ${isDetected ? 'border-[#ff0055]/50 bg-[#ff0055]/10 text-[#ff0055] shadow-[0_0_10px_rgba(255,0,85,0.2)] hover:shadow-[0_0_15px_rgba(255,0,85,0.5)]' : 'border-[#00ff88]/20 bg-gray-900/40 text-gray-400 hover:border-[#00ff88]/50 hover:text-[#00ff88] hover:shadow-[0_0_10px_rgba(0,255,136,0.2)]'}`}
                                         style={{ animationDelay: `${index * 50}ms` }}
                                     >
                                         <span className="text-sm font-semibold tracking-wide">{label}</span>
                                         {isDetected ? (
                                             <i className='bx bxs-error-circle text-xl animate-pulse drop-shadow-[0_0_8px_rgba(255,0,85,0.8)]'></i>
                                         ) : (
                                             <i className='bx bx-check-circle text-xl opacity-50 transition-opacity duration-300 hover:opacity-100'></i>
                                         )}
                                     </div>
                                 );
                             })}
                        </div>
                    </div>
                </div>

                {detectionChartData.length > 0 && BarChart && (
                    <div className="grid grid-cols-1 gap-6">
                        <div className="th-glass-card p-6 rounded-xl h-[300px] transition-all duration-300">
                            <h3 className="text-[#00f5ff] text-sm uppercase tracking-widest border-b border-[#00f5ff]/20 pb-2 mb-4">
                                Attack Vectors (Active)
                            </h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart
                                    data={detectionChartData}
                                    layout="vertical"
                                    margin={{ top: 10, right: 30, left: 20, bottom: 5 }}
                                >
                                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,245,255,0.1)" horizontal={false} />
                                    <XAxis type="number" hide />
                                    <YAxis dataKey="name" type="category" stroke="#00f5ff" width={150} tick={{fill: '#a0aec0', fontSize: 11, fontFamily: 'monospace'}} />
                                    <Tooltip 
                                        cursor={{fill: 'rgba(0,245,255,0.05)'}}
                                        contentStyle={{ backgroundColor: 'rgba(5, 20, 40, 0.9)', borderColor: '#00f5ff', borderRadius: '8px', boxShadow: '0 0 15px rgba(0,245,255,0.2)', fontFamily: 'monospace' }}
                                        itemStyle={{ color: '#ff0055', fontWeight: 'bold' }}
                                    />
                                    <Bar dataKey="value" fill="#ff0055" radius={[0, 4, 4, 0]} isAnimationActive={true} animationDuration={1500} animationEasing="ease-out">
                                        {
                                            detectionChartData.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                            ))
                                        }
                                    </Bar>
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                )}
            </div>
          )}

          {/* Threat Info Modal */}
          {selectedThreatInfo && (
              <div 
                  className="fixed inset-0 z-50 flex items-center justify-center bg-[#010613]/80 backdrop-blur-md transition-opacity animate-[fadeIn_0.3s_ease-out]" 
                  onClick={() => setSelectedThreatInfo(null)}
              >
                  <div 
                      className="th-glass-card max-w-lg w-full p-8 rounded-2xl relative animate-[scaleUp_0.3s_ease-out]" 
                      onClick={e => e.stopPropagation()}
                  >
                      <button 
                          className="absolute top-4 right-4 text-[#00f5ff] hover:text-[#ff0055] transition-colors"
                          onClick={() => setSelectedThreatInfo(null)}
                      >
                          <i className='bx bx-x text-3xl'></i>
                      </button>
                      
                      <div className="flex items-center gap-4 mb-6">
                          <i className='bx bx-radar text-4xl text-[#00ff88] drop-shadow-[0_0_10px_rgba(0,255,136,0.8)]'></i>
                          <h2 className="text-2xl font-bold text-white tracking-wider">{selectedThreatInfo.title}</h2>
                      </div>
                      
                      <div className="space-y-6">
                          <div>
                              <h3 className="text-[#00f5ff] text-xs uppercase tracking-widest mb-2 border-b border-[#00f5ff]/20 pb-1 flex items-center gap-2">
                                  <i className='bx bx-info-circle'></i> Threat Description
                              </h3>
                              <p className="text-gray-300 text-sm leading-relaxed">{selectedThreatInfo.desc}</p>
                          </div>
                          
                          <div>
                              <h3 className="text-[#00ff88] text-xs uppercase tracking-widest mb-2 border-b border-[#00ff88]/20 pb-1 flex items-center gap-2">
                                  <i className='bx bx-shield-quarter'></i> Recommended Mitigation
                              </h3>
                              <p className="text-gray-300 text-sm leading-relaxed">{selectedThreatInfo.mitigation}</p>
                          </div>
                      </div>
                  </div>
              </div>
          )}
        </div>
      );
    };

    try {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ThreatHunterApp />);
    } catch(e) {
        document.getElementById('root').innerHTML = "<div style='color:red; padding: 20px;'>Error initializing React app: " + e.message + "</div>";
    }
  </script>
</html>
